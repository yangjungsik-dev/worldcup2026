      C: { prediction: ["BRA","MAR","SCO","HAI"], summary: "브라질은 FIFA 랭킹 5위의 강호로 조 1위가 확실시됩니다. 모로코는 카타르 월드컵 4강의 저력을 이어갈 전망입니다.", insights: ["브라질은 네이마르 이후 세대 전환기이지만 여전히 강력", "모로코는 아프리카 최강으로 유럽팀도 긴장", "스코틀랜드는 역사적으로 월드컵 본선에서 고전"] },
      D: { prediction: ["USA","AUS","PAR","POC"], summary: "미국은 개최국 이점과 젊은 재능들로 조 1위를 노립니다. 호주는 카타르 월드컵 8강 신화를 재현할 가능성이 있습니다.", insights: ["미국은 새로운 황금세대 성장 중", "호주는 사커루스의 핵심 공격수 활약 기대", "파라과이는 남미 특유의 피지컬 축구로 변수"] },
      E: { prediction: ["GER","ECU","CIV","CUW"], summary: "독일은 FIFA 랭킹 9위로 조 1위 최유력 후보입니다. 에콰도르는 남미의 신흥 강호로 2위 경쟁이 치열할 전망입니다.", insights: ["독일은 전술 혁신으로 2018·2022 조기탈락 설욕 노림", "코트디부아르는 아프리카 예선 최강자", "퀴라소는 처음 진출한 신흥 팀으로 이변 가능성 낮음"] },
      F: { prediction: ["NED","JPN","TUN","POB"], summary: "네덜란드는 FIFA 랭킹 7위의 강호로 조 1위가 유력합니다. 일본은 카타르 월드컵 16강의 기세를 이어가 2위를 노립니다.", insights: ["네덜란드 판다이크 중심의 수비 철벽", "일본은 유럽파 중심으로 전력이 크게 업그레이드", "튀니지는 아프리카 3번째 시드로 이변 가능성"] },
      G: { prediction: ["BEL","IRN","EGY","NZL"], summary: "벨기에는 황금세대의 마지막 월드컵으로 반드시 1위를 노립니다. 이란은 아시아의 강호로 16강 진출을 노립니다.", insights: ["벨기에 데브뤼너·루카쿠는 여전히 세계 최고 수준", "이란은 아시아 예선 1위로 올라온 강팀", "이집트 살라의 개인기가 변수"] },
      H: { prediction: ["ESP","URU","CPV","KSA"], summary: "스페인은 FIFA 랭킹 1위의 절대 강호로 조 1위가 확실합니다. 우루과이는 남미의 전통 강호로 2위를 노립니다.", insights: ["스페인은 티키타카 부활로 우승 후보 1순위", "우루과이 누네스·발베르데 세대교체 완성", "카보베르데는 아프리카 예선 돌풍 팀"] },
      I: { prediction: ["FRA","SEN","NOR","PL2"], summary: "프랑스는 FIFA 랭킹 3위의 디펜딩 준우승팀으로 조 1위가 유력합니다. 세네갈은 아프리카 최강으로 2위 경쟁을 벌일 것입니다.", insights: ["프랑스 음바페가 이끄는 공격진은 세계 최강", "세네갈 마네 없이도 강한 조직력 유지", "노르웨이 홀란드의 골 결정력이 최대 변수"] },
      J: { prediction: ["ARG","AUT","ALG","JOR"], summary: "아르헨티나는 디펜딩 챔피언으로 조 1위가 확실합니다. 오스트리아는 유럽의 신흥 강호로 2위를 노립니다.", insights: ["아르헨티나 메시의 마지막 월드컵 방어전", "오스트리아는 분데스리가 정상급 선수들로 구성", "알제리는 아프리카 3번째 시드로 이변 가능성"] },
      K: { prediction: ["POR","COL","UZB","PL1"], summary: "포르투갈은 FIFA 랭킹 6위로 조 1위가 유력합니다. 콜롬비아는 남미의 강호로 2위 경쟁에서 우위를 점할 전망입니다.", insights: ["포르투갈은 호날두 이후 세대교체로 오히려 더 강해짐", "콜롬비아 루이스 디아스는 세계 최고 윙어 중 한 명", "우즈베키스탄은 아시아 예선 돌풍 팀"] },
      L: { prediction: ["ENG","CRO","GHA","PAN"], summary: "잉글랜드는 FIFA 랭킹 4위의 강호로 조 1위가 유력합니다. 크로아티아는 카타르 준우승의 저력으로 2위를 노립니다.", insights: ["잉글랜드는 벨링엄 중심으로 황금세대 완성", "크로아티아 모드리치의 마지막 월드컵 도전", "가나는 아프리카 3번째 시드로 이변 가능성"] },
    };

    function sortByRank(t) { return [...t].sort((a, b) => a.rank - b.rank); }

    function FlagCell({ code }) {
      const src = FLAG_IMAGES[code];
      return src
        ? <img src={src} alt={code} style={{ width: 38, height: 26, objectFit: "contain", flexShrink: 0 }} />
        : <span style={{ fontSize: 16, flexShrink: 0 }}>🏳️</span>;
    }

    function Handle() {
      return (
        <svg width="16" height="10" viewBox="0 0 16 10" style={{ flexShrink: 0 }}>
          <rect y="0" width="16" height="2" rx="1" fill="#b0bec5"/>
          <rect y="5" width="16" height="2" rx="1" fill="#b0bec5"/>
        </svg>
      );
    }

    function SavedToast({ onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 2000);
        return () => clearTimeout(t);
      }, []);
      return (
        <div style={{
          position: "fixed", bottom: 100, left: "50%", transform: "translateX(-50%)",
          background: "#1c1c2e", color: "#fff", fontFamily: HEL, fontWeight: 700,
          fontSize: 14, padding: "14px 28px", borderRadius: 50,
          boxShadow: "0 8px 32px rgba(0,0,0,0.22)",
          display: "flex", alignItems: "center", gap: 10,
          zIndex: 2000,
          animation: "fadeInUp 0.25s ease",
        }}>
          <span style={{ fontSize: 18 }}>✅</span> 저장되었습니다.
        </div>
      );
    }

    function GroupCard({ groupId, teams, onAIClick }) {
      const [order, setOrder] = useState(sortByRank(teams));
      const [dragging, setDragging] = useState(null);
      const [dragOver, setDragOver] = useState(null);
      const onDS = (e, i) => { setDragging(i); e.dataTransfer.effectAllowed = "move"; };
      const onDO = (e, i) => { e.preventDefault(); if (i !== dragOver) setDragOver(i); };
      const onDrop = (e, i) => {
        e.preventDefault();
        if (dragging === null || dragging === i) return;
        const next = [...order]; const [m] = next.splice(dragging, 1); next.splice(i, 0, m);
        setOrder(next); setDragging(null); setDragOver(null);
      };
      return (
        <div style={{ background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 2px 12px rgba(0,0,0,0.08)", border:"1px solid #e2e8f0", minWidth: 0, maxWidth: "100%", flex: "none" }}>
          <div style={{ background:"#1c1c2e", padding:"13px 15px 12px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontFamily:HEL, fontWeight:900, fontSize:18, color:"#fff", letterSpacing:1 }}>GROUP {groupId}</span>
            <button
              onClick={() => onAIClick(groupId, order)}
              title="AI 예측"
              style={{ background:"#1c1c2e", border:"1.5px solid rgba(255,255,255,0.18)", borderRadius:8, width:34, height:34, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", padding:0, transition:"border-color .15s, transform .13s", flexShrink:0 }}
              onMouseEnter={e => { e.currentTarget.style.borderColor="rgba(255,255,255,0.45)"; e.currentTarget.style.transform="scale(1.08)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor="rgba(255,255,255,0.18)"; e.currentTarget.style.transform="scale(1)"; }}
            >
              <svg width="17" height="16" viewBox="0 0 17 16" fill="none">
                <rect x="1" y="3" width="11" height="1.8" rx="0.9" fill="white"/>
                <rect x="1" y="7.1" width="11" height="1.8" rx="0.9" fill="white"/>
                <rect x="1" y="11.2" width="7" height="1.8" rx="0.9" fill="white"/>
                <path d="M14 7 L16 9.2 L13.5 11 L13 8.5 Z" fill="white"/>
                <circle cx="14.5" cy="5.5" r="1.3" fill="white"/>
              </svg>
            </button>
          </div>
          {order.map((t, i) => (
            <div key={t.code} draggable
              onDragStart={e => onDS(e,i)} onDragOver={e => onDO(e,i)}
              onDrop={e => onDrop(e,i)} onDragEnd={() => { setDragging(null); setDragOver(null); }}
              style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 12px 9px 14px", borderBottom:i<3?"1px solid #f1f4f9":"none", background:dragOver===i?"#eff4ff":dragging===i?"#e6eeff":"#fff", transition:"background .1s", cursor:"grab", userSelect:"none" }}
            >
              <span style={{ fontFamily:HEL, fontWeight:700, fontSize:15, width:18, textAlign:"center", flexShrink:0, color:i<2?"#1a6ef5":"#1e293b" }}>{i+1}</span>
              <FlagCell code={t.code} />
              <span style={{ flex:1, fontFamily:HEL, fontWeight:700, fontSize:13, color:i<2?"#1e293b":"#b0bec5", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}</span>
              <span style={{ fontFamily:HEL, fontWeight:700, fontSize:11, color:"#94a3b8", flexShrink:0 }}>FIFA {t.rank}위</span>
              <Handle />
            </div>
          ))}
        </div>
      );
    }

    function AIModal({ groupId, order, onClose }) {
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(true);
      const run = () => {
        setLoading(true); setResult(null);
        setTimeout(() => {
          setResult(MOCK_PREDICTIONS[groupId] || MOCK_PREDICTIONS["A"]);
          setLoading(false);
        }, 1200);
      };
      useEffect(() => { run(); }, []);
      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:"#fff", borderRadius:18, maxWidth:400, width:"100%", boxShadow:"0 12px 48px rgba(0,0,0,0.2)", overflow:"hidden" }}>
            <div style={{ background:"#1c1c2e", padding:"17px 20px 14px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:HEL, color:"#7c83fd", fontWeight:700, fontSize:11, letterSpacing:1 }}>AI 분석</div>
                <div style={{ fontFamily:HEL, color:"#fff", fontWeight:900, fontSize:19 }}>GROUP {groupId} 예측</div>
              </div>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:8, color:"#fff", fontSize:17, width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>✕</button>
            </div>
            <div style={{ padding:"18px 20px 22px" }}>
              {loading && <div style={{ textAlign:"center", padding:"28px 0" }}><div style={{ fontSize:34, marginBottom:10 }}>⚽</div><div style={{ fontFamily:HEL, color:"#64748b", fontSize:14 }}>AI 분석 중...</div></div>}
              {result && !loading && (
                <div>
                  <div style={{ fontFamily:HEL, fontWeight:800, fontSize:13, color:"#1e293b", marginBottom:9 }}>🏆 AI 예측 순위</div>
                  {result.prediction?.map((code,i) => {
                    const t = order.find(x => x.code===code)||{name:code, rank:"?"};
                    const bgs=["#fffbeb","#f8fafc","#fff7f0","#f8f8f8"], bars=["#f59e0b","#94a3b8","#cd7f32","#e2e8f0"];
                    return (
                      <div key={code} style={{ display:"flex", alignItems:"center", gap:10, background:bgs[i], borderLeft:`4px solid ${bars[i]}`, borderRadius:"0 10px 10px 0", padding:"8px 12px", marginBottom:5 }}>
                        <span style={{ fontFamily:HEL, fontWeight:700, fontSize:15, width:18, color:i<2?"#1a6ef5":"#94a3b8" }}>{i+1}</span>
                        <FlagCell code={code} />
                        <span style={{ fontFamily:HEL, fontWeight:700, color:"#1e293b", fontSize:13 }}>{t.name}</span>
                        <span style={{ marginLeft:"auto", fontFamily:HEL, fontSize:11, color:"#94a3b8" }}>FIFA {t.rank}위</span>
                      </div>
                    );
                  })}
                  {result.summary && (
                    <div style={{ background:"#f0f5ff", borderRadius:10, padding:"11px 13px", margin:"14px 0 12px", borderLeft:"4px solid #1a6ef5" }}>
                      <div style={{ fontFamily:HEL, fontWeight:700, fontSize:11, color:"#1a6ef5", marginBottom:4 }}>📋 분석 요약</div>
                      <div style={{ fontFamily:HEL, color:"#475569", fontSize:13, lineHeight:1.6 }}>{result.summary}</div>
                    </div>
                  )}
                  {result.insights?.length > 0 && (
                    <div>
                      <div style={{ fontFamily:HEL, fontWeight:800, fontSize:13, color:"#1e293b", marginBottom:7 }}>💡 핵심 인사이트</div>
                      {result.insights.map((ins,i) => (
                        <div key={i} style={{ display:"flex", gap:8, marginBottom:6, padding:"7px 10px", background:"#f8fafc", borderRadius:8 }}>
                          <span style={{ color:"#1a6ef5", fontWeight:700, flexShrink:0 }}>•</span>
                          <span style={{ fontFamily:HEL, color:"#475569", fontSize:12, lineHeight:1.55 }}>{ins}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <button onClick={run} style={{ marginTop:14, width:"100%", background:"linear-gradient(135deg,#1a6ef5,#3b82f6)", color:"#fff", border:"none", borderRadius:10, padding:"11px", fontFamily:HEL, fontWeight:700, cursor:"pointer", fontSize:13 }}>🔄 다시 분석하기</button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function useColumns() {
      const [cols, setCols] = useState(3);
      useEffect(() => {
        const update = () => {
          const w = window.innerWidth - 32;
          if (w >= 1200) setCols(4);
          else if (w >= 900) setCols(3);
          else if (w >= 600) setCols(2);
          else setCols(1);
        };
        update();
        window.addEventListener("resize", update);
        return () => window.removeEventListener("resize", update);
      }, []);
      return cols;
    }

    function App() {
      const [modal, setModal] = useState(null);
      const [toast, setToast] = useState(false);
      const cols = useColumns();
      const entries = Object.entries(GROUPS);
      const columns = Array.from({ length: cols }, (_, ci) =>
        entries.filter((_, i) => i % cols === ci)
      );
      return (
        <div style={{ minHeight:"100vh", background:"#edf0f4", padding:"26px 16px 100px", fontFamily:HEL, boxSizing:"border-box" }}>
          <div style={{ textAlign:"center", marginBottom:28 }}>
            <div style={{ color:"#1a6ef5", fontWeight:700, fontSize:12, letterSpacing:2, marginBottom:6 }}>FIFA WORLD CUP 2026</div>
            <h1 style={{ color:"#1c1c2e", fontSize:24, fontWeight:900, margin:0 }}>⚽ 조별리그 순위 예측</h1>
            <p style={{ color:"#94a3b8", fontSize:12, marginTop:7 }}>팀을 드래그해서 순위를 바꾸고 · 🤖 버튼으로 AI 분석 확인</p>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols}, 1fr)`, gap:16, maxWidth:1400, margin:"0 auto" }}>
            {columns.map((col, ci) => (
              <div key={ci} style={{ display:"flex", flexDirection:"column", gap:16 }}>
                {col.map(([id, teams]) => (
                  <GroupCard key={id} groupId={id} teams={teams} onAIClick={(gid,ord) => setModal({groupId:gid, order:ord})} />
                ))}
              </div>
            ))}
          </div>
          <button
            onClick={() => setToast(true)}
            style={{
              position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)",
              background:"linear-gradient(135deg,#1a6ef5,#3b82f6)",
              color:"#fff", border:"none", borderRadius:50,
              padding:"16px 48px", fontFamily:HEL, fontWeight:800,
              fontSize:16, cursor:"pointer", zIndex:900,
              boxShadow:"0 8px 28px rgba(26,110,245,0.45)", letterSpacing:1,
            }}
          >✓ 확인</button>
          {toast && <SavedToast onClose={() => setToast(false)} />}
          {modal && <AIModal groupId={modal.groupId} order={modal.order} onClose={() => setModal(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
